<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global War Live Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff2d2d;--amber:#f5a623;--cyan:#00e5ff;--green:#39ff83;
  --bg:#040710;--panel:#080d1c;--card:#0a1020;
  --border:rgba(255,255,255,0.055);--muted:#3a4c6e;--text:#b8cce0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(4,7,16,0.96);border-bottom:1px solid rgba(255,45,45,0.22);backdrop-filter:blur(24px);position:sticky;top:0;z-index:100;gap:16px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 0 rgba(255,45,45,0.7);animation:pulseR 1.5s ease-in-out infinite}
@keyframes pulseR{0%{box-shadow:0 0 0 0 rgba(255,45,45,0.7)}70%{box-shadow:0 0 0 9px rgba(255,45,45,0)}100%{box-shadow:0 0 0 0 rgba(255,45,45,0)}}
.live-text{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--red)}
.tb-center{font-family:'Orbitron',monospace;font-size:clamp(10px,2vw,17px);font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#ff2d2d,#ff8c00,#ffdd00,#ff8c00,#ff2d2d);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleFlow 5s linear infinite;text-transform:uppercase;text-align:center;flex:1}
@keyframes titleFlow{to{background-position:300% 0}}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-switcher{display:flex;gap:4px}
.lang-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s}
.lang-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
.lang-btn.active{background:rgba(255,45,45,0.12);border-color:rgba(255,45,45,0.5);color:var(--red)}
#clock{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:1px;min-width:90px;text-align:right}

/* WORLD STRIP */
.world-strip{display:flex;justify-content:center;border-bottom:1px solid var(--border);background:rgba(8,13,28,0.85);overflow:hidden}
.world-item{flex:1;max-width:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 20px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.world-item:last-child{border-right:none}
.world-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.world-item.pop::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.world-item.die::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.world-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;text-align:center}
.world-value{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(17px,3vw,26px);line-height:1}
.world-item.pop .world-value{color:var(--cyan);text-shadow:0 0 28px rgba(0,229,255,0.4)}
.world-item.die .world-value{color:var(--red);text-shadow:0 0 28px rgba(255,45,45,0.4)}
.world-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:6px;text-align:center}

/* SECTION WRAP */
.sw{max-width:1160px;margin:0 auto;padding:0 24px}

/* TOTALS BAR */
.totals-bar{display:flex;flex-wrap:wrap;border:1px solid rgba(255,45,45,0.18);border-radius:6px;overflow:hidden;background:rgba(255,45,45,0.04);margin-bottom:28px;position:relative}
.totals-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:scanB 3s ease-in-out infinite}
@keyframes scanB{0%,100%{opacity:0.3}50%{opacity:1}}
.ti{flex:1;min-width:140px;display:flex;flex-direction:column;align-items:center;padding:18px 12px;background:rgba(8,13,28,0.6);border-right:1px solid rgba(255,45,45,0.1)}
.ti:last-child{border-right:none}
.ti-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;text-align:center}
.ti-val{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(16px,2.5vw,26px);color:var(--red);text-shadow:0 0 22px rgba(255,45,45,0.5);text-align:center}
.ti-val.c{color:var(--cyan);text-shadow:0 0 22px rgba(0,229,255,0.4)}
.ti-val.g{color:var(--green);text-shadow:0 0 22px rgba(57,255,131,0.4)}
.ti-val.a{color:var(--amber);text-shadow:0 0 22px rgba(245,166,35,0.4)}

/* SEC HEAD */
.sec-head{display:flex;align-items:center;gap:14px;margin:28px 0 18px}
.sec-head-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:4px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sec-head-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent)}
body[dir="rtl"] .sec-head-line{background:linear-gradient(270deg,rgba(255,255,255,0.08),transparent)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px;margin-bottom:28px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;position:relative;overflow:hidden;transition:transform 0.3s,border-color 0.3s,box-shadow 0.3s}
.ccard:hover{transform:translateY(-5px)}
.ccard.iran  {border-color:rgba(0,229,255,0.15)}
.ccard.israel{border-color:rgba(245,166,35,0.15)}
.ccard.usa   {border-color:rgba(255,45,45,0.15)}
.ccard:hover.iran  {border-color:rgba(0,229,255,0.4);box-shadow:0 12px 40px rgba(0,229,255,0.07)}
.ccard:hover.israel{border-color:rgba(245,166,35,0.4);box-shadow:0 12px 40px rgba(245,166,35,0.07)}
.ccard:hover.usa   {border-color:rgba(255,45,45,0.4);box-shadow:0 12px 40px rgba(255,45,45,0.07)}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ccard.iran::before  {background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.ccard.israel::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.ccard.usa::before   {background:linear-gradient(90deg,transparent,var(--red),transparent)}
.ccard::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;pointer-events:none;opacity:0.035}
.ccard.iran::after  {background:var(--cyan)}
.ccard.israel::after{background:var(--amber)}
.ccard.usa::after   {background:var(--red)}
.card-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.flag{font-size:36px;line-height:1;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.6))}
.cname{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:#fff}
.crole{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;margin-top:3px}
.ccard.iran   .crole{color:var(--cyan)}
.ccard.israel .crole{color:var(--amber)}
.ccard.usa    .crole{color:var(--red)}
.cbadge{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0}
body[dir="rtl"] .cbadge{margin-left:0;margin-right:auto}
.ccard.iran   .cbadge{background:rgba(0,229,255,0.08);color:var(--cyan);border:1px solid rgba(0,229,255,0.25)}
.ccard.israel .cbadge{background:rgba(245,166,35,0.08);color:var(--amber);border:1px solid rgba(245,166,35,0.25)}
.ccard.usa    .cbadge{background:rgba(255,45,45,0.08);color:var(--red);border:1px solid rgba(255,45,45,0.25)}
.crow{display:flex;justify-content:space-between;align-items:flex-end;padding:11px 0;border-bottom:1px solid var(--border)}
.crow:last-child{border-bottom:none;padding-bottom:0}
.clabel{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;line-height:1.4}
.cval{font-family:'Orbitron',monospace;font-weight:700;line-height:1;text-align:right}
body[dir="rtl"] .cval{text-align:left}
.cval.big{font-size:24px;color:#ff4040;text-shadow:0 0 16px rgba(255,64,64,0.45)}
.cval.med{font-size:15px;color:#7affb0;text-shadow:0 0 12px rgba(0,255,100,0.3)}
.cval.sm {font-size:14px;color:#fff}
.cval.sm2{font-size:13px;color:var(--amber)}
.tick-up{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--red);animation:blk 1.8s step-end infinite;display:block;text-align:right}
body[dir="rtl"] .tick-up{text-align:left}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0.2}}

/* MINI */
.mini-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:14px;margin-bottom:28px}
.mini{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:18px 14px;text-align:center;transition:transform 0.2s,border-color 0.2s}
.mini:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.12)}
.mini-icon{font-size:22px;margin-bottom:8px;display:block}
.mini-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.mini-val{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;color:#fff}

/* MAP */
.map-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;margin-bottom:44px}
.map-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(4,7,16,0.65) 0%,transparent 18%,transparent 82%,rgba(4,7,16,0.65) 100%),linear-gradient(90deg,rgba(4,7,16,0.5) 0%,transparent 10%,transparent 90%,rgba(4,7,16,0.5) 100%);pointer-events:none;z-index:1}
iframe{display:block;width:100%;height:420px;border:none;filter:saturate(0.22) brightness(0.42) hue-rotate(170deg)}

/* FOOTER */
footer{text-align:center;padding:18px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px}

/* SCANLINES */
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:999}

@media(max-width:640px){
  .topbar{padding:10px 12px}
  .world-strip{flex-direction:column}
  .world-item{border-right:none;border-bottom:1px solid var(--border);padding:14px}
  .sw{padding:0 12px}
  .ti{min-width:120px}
}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="page">

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="live-dot"></div>
    <span class="live-text">LIVE</span>
  </div>
  <div class="tb-center" id="tb-title">🌐 GLOBAL WAR LIVE TRACKER</div>
  <div class="tb-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ku')">KU</button>
      <button class="lang-btn" onclick="setLang('ar')">AR</button>
    </div>
    <div id="clock">00:00:00 UTC</div>
  </div>
</div>

<!-- WORLD COUNTERS -->
<div class="world-strip">
  <div class="world-item pop">
    <div class="world-label" data-key="world_pop_label"></div>
    <div class="world-value" id="world-pop">0</div>
    <div class="world-sub" data-key="world_pop_sub"></div>
  </div>
  <div class="world-item die">
    <div class="world-label" data-key="world_deaths_label"></div>
    <div class="world-value" id="world-deaths">0</div>
    <div class="world-sub" data-key="world_deaths_sub"></div>
  </div>
</div>

<!-- MAIN -->
<div class="sw">

  <div class="sec-head" style="margin-top:28px">
    <div class="sec-head-title" data-key="global_overview"></div>
    <div class="sec-head-line"></div>
  </div>

  <div class="totals-bar">
    <div class="ti"><div class="ti-label" data-key="tot_killed"></div><div class="ti-val" id="tot-d">0</div></div>
    <div class="ti"><div class="ti-label" data-key="tot_injured"></div><div class="ti-val c" id="tot-inj">0</div></div>
    <div class="ti"><div class="ti-label" data-key="tot_cost"></div><div class="ti-val g" id="tot-cost">$0</div></div>
    <div class="ti"><div class="ti-label" data-key="tot_missiles"></div><div class="ti-val a" id="tot-m">0</div></div>
    <div class="ti"><div class="ti-label" data-key="tot_exp"></div><div class="ti-val" id="tot-exp">0</div></div>
  </div>

  <div class="sec-head">
    <div class="sec-head-title" data-key="by_country"></div>
    <div class="sec-head-line"></div>
  </div>

  <div class="cards-grid">

    <!-- IRAN -->
    <div class="ccard iran">
      <div class="card-head">
        <div class="flag">🇮🇷</div>
        <div><div class="cname">IRAN</div><div class="crole">IRGC · ARMED FORCES</div></div>
        <div class="cbadge" data-key="badge_active"></div>
      </div>
      <div class="crow"><div class="clabel" data-key="killed"></div><div><div class="cval big" id="iran-d">0</div><span class="tick-up" data-key="rising"></span></div></div>
      <div class="crow"><div class="clabel" data-key="injured"></div><div class="cval sm" id="iran-inj">0</div></div>
      <div class="crow"><div class="clabel" data-key="war_cost"></div><div class="cval med" id="iran-cost">$0</div></div>
      <div class="crow"><div class="clabel" data-key="missiles"></div><div class="cval sm" id="iran-m">0</div></div>
      <div class="crow"><div class="clabel" data-key="commanders"></div><div class="cval sm2" id="iran-cmd">0</div></div>
    </div>

    <!-- ISRAEL -->
    <div class="ccard israel">
      <div class="card-head">
        <div class="flag">🇮🇱</div>
        <div><div class="cname">ISRAEL</div><div class="crole">IDF · MOSSAD</div></div>
        <div class="cbadge" data-key="badge_active"></div>
      </div>
      <div class="crow"><div class="clabel" data-key="killed"></div><div><div class="cval big" id="isr-d">0</div><span class="tick-up" data-key="rising"></span></div></div>
      <div class="crow"><div class="clabel" data-key="injured"></div><div class="cval sm" id="isr-inj">0</div></div>
      <div class="crow"><div class="clabel" data-key="war_cost"></div><div class="cval med" id="isr-cost">$0</div></div>
      <div class="crow"><div class="clabel" data-key="missiles"></div><div class="cval sm" id="isr-m">0</div></div>
      <div class="crow"><div class="clabel" data-key="agents"></div><div class="cval sm2" id="isr-agt">0</div></div>
    </div>

    <!-- USA -->
    <div class="ccard usa">
      <div class="card-head">
        <div class="flag">🇺🇸</div>
        <div><div class="cname">U.S.A</div><div class="crole">PENTAGON · CENTCOM</div></div>
        <div class="cbadge" data-key="badge_support"></div>
      </div>
      <div class="crow"><div class="clabel" data-key="killed"></div><div><div class="cval big" id="usa-d">0</div><span class="tick-up" data-key="rising"></span></div></div>
      <div class="crow"><div class="clabel" data-key="injured"></div><div class="cval sm" id="usa-inj">0</div></div>
      <div class="crow"><div class="clabel" data-key="war_cost"></div><div class="cval med" id="usa-cost">$0</div></div>
      <div class="crow"><div class="clabel" data-key="missiles"></div><div class="cval sm" id="usa-m">0</div></div>
      <div class="crow"><div class="clabel" data-key="aircraft"></div><div class="cval sm2" id="usa-air">0</div></div>
    </div>

  </div>

  <div class="sec-head">
    <div class="sec-head-title" data-key="other_stats"></div>
    <div class="sec-head-line"></div>
  </div>

  <div class="mini-row">
    <div class="mini"><span class="mini-icon">💥</span><div class="mini-label" data-key="explosions"></div><div class="mini-val" id="m-exp">0</div></div>
    <div class="mini"><span class="mini-icon">🚢</span><div class="mini-label" data-key="ships_sunk"></div><div class="mini-val" id="m-ships">0</div></div>
    <div class="mini"><span class="mini-icon">🛢️</span><div class="mini-label" data-key="oil_loss"></div><div class="mini-val" id="m-oil">0</div></div>
    <div class="mini"><span class="mini-icon">🏙️</span><div class="mini-label" data-key="cities_hit"></div><div class="mini-val" id="m-cities">34</div></div>
    <div class="mini"><span class="mini-icon">✈️</span><div class="mini-label" data-key="air_strikes"></div><div class="mini-val" id="m-airstr">0</div></div>
    <div class="mini"><span class="mini-icon">🏚️</span><div class="mini-label" data-key="displaced"></div><div class="mini-val" id="m-disp">0</div></div>
  </div>

  <div class="sec-head">
    <div class="sec-head-title" data-key="conflict_map"></div>
    <div class="sec-head-line"></div>
  </div>

  <div class="map-wrap">
    <iframe src="https://maps.google.com/maps?q=middle+east&t=k&z=5&ie=UTF8&iwloc=&output=embed" allowfullscreen loading="lazy"></iframe>
  </div>

</div>

<footer><span data-key="footer_note"></span></footer>
</div>

<script>
/* ─── TRANSLATIONS ─── */
const T = {
  en:{
    dir:'ltr',
    tb_title:'🌐 GLOBAL WAR LIVE TRACKER',
    world_pop_label:'🌍 WORLD POPULATION · LIVE',
    world_pop_sub:'+2.3 PERSONS / SECOND',
    world_deaths_label:'💀 WORLD DEATHS TODAY · LIVE',
    world_deaths_sub:'~2.1 DEATHS / SECOND',
    global_overview:'▸ GLOBAL OVERVIEW',
    tot_killed:'TOTAL KILLED',tot_injured:'TOTAL INJURED',tot_cost:'TOTAL WAR COST',tot_missiles:'MISSILES FIRED',tot_exp:'TOTAL EXPLOSIONS',
    by_country:'▸ BY COUNTRY',
    badge_active:'● ACTIVE',badge_support:'● SUPPORT',
    killed:'KILLED',injured:'INJURED',war_cost:'WAR COST',missiles:'MISSILES FIRED',commanders:'COMMANDERS KILLED',agents:'AGENTS ELIMINATED',aircraft:'AIRCRAFT LOST',
    other_stats:'▸ OTHER STATISTICS',
    explosions:'EXPLOSIONS',ships_sunk:'SHIPS SUNK',oil_loss:'OIL BARRELS LOST',cities_hit:'CITIES STRUCK',air_strikes:'AIR STRIKES',displaced:'DISPLACED PEOPLE',
    conflict_map:'▸ CONFLICT ZONE MAP',
    footer_note:'⚠ DATA IS APPROXIMATE AND FOR INFORMATIONAL PURPOSES ONLY · NOT FOR POLITICAL USE',
    rising:'▲ RISING',
  },
  ku:{
    dir:'rtl',
    tb_title:'🌐 شوێنکەوتنی جەنگی جیهانی · زیندوو',
    world_pop_label:'🌍 دانیشتووانی جیهان · زیندوو',
    world_pop_sub:'لە چرکەیەکدا +٢.٣ کەس زیاد دەبێت',
    world_deaths_label:'💀 مردووانی ئەمرۆی جیهان · زیندوو',
    world_deaths_sub:'لە چرکەیەکدا ~٢.١ کەس دەمرێت',
    global_overview:'▸ کورتەی گشتی',
    tot_killed:'کۆی کوژراوان',tot_injured:'کۆی بریندارەکان',tot_cost:'کۆی تێچووی شەڕ',tot_missiles:'کۆی مووشەکەکان',tot_exp:'کۆی تەقینەوەکان',

function setLang(l){
  const t=T[l];
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.body.setAttribute('dir',t.dir);
  document.documentElement.lang=l;
  document.getElementById('tb-title').textContent=t.tb_title;
  document.querySelectorAll('[data-key]').forEach(el=>{
    const k=el.dataset.key;
    if(t[k]!==undefined) el.textContent=t[k];
  });
}

/* ─── STATE ─── */
const S={
  iranD:3850,iranInj:9200,iranCost:18700000000,iranM:2340,iranCmd:47,
  isrD:1640,isrInj:7800,isrCost:32400000000,isrM:890,isrAgt:23,
  usaD:235,usaInj:820,usaCost:87500000000,usaM:1100,usaAir:14,
  explosions:6820,ships:18,oil:4250000,airStrikes:1430,displaced:2140000,
};

/* World pop base: ~8,162,500,000 Mar 2025 · +2.3/sec */
const POP_BASE=8162500000, POP_RATE=2.3;
/* World deaths: ~68M/yr → 2.157/sec; reset at midnight UTC */
const DEATH_RATE=2.157;
const startTs=Date.now();

function worldPop(){return POP_BASE+POP_RATE*(Date.now()-startTs)/1000}
function worldDeaths(){
  const n=new Date();
  const sec=n.getUTCHours()*3600+n.getUTCMinutes()*60+n.getUTCSeconds()+n.getUTCMilliseconds()/1000;
  return DEATH_RATE*sec;
}

function fmt(n){return Math.floor(n).toLocaleString()}
function fmtM(n){
  if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return'$'+(n/1e6).toFixed(1)+'M';
  return'$'+Math.floor(n).toLocaleString();
}
function rnd(mx){return Math.random()<0.5?Math.floor(Math.random()*mx):0}

function render(){
  document.getElementById('world-pop').textContent=fmt(worldPop());
  document.getElementById('world-deaths').textContent=fmt(worldDeaths());

  document.getElementById('iran-d').textContent=fmt(S.iranD);
  document.getElementById('iran-inj').textContent=fmt(S.iranInj);
  document.getElementById('iran-cost').textContent=fmtM(S.iranCost);
  document.getElementById('iran-m').textContent=fmt(S.iranM);
  document.getElementById('iran-cmd').textContent=fmt(S.iranCmd);

  document.getElementById('isr-d').textContent=fmt(S.isrD);
  document.getElementById('isr-inj').textContent=fmt(S.isrInj);
  document.getElementById('isr-cost').textContent=fmtM(S.isrCost);
  document.getElementById('isr-m').textContent=fmt(S.isrM);
  document.getElementById('isr-agt').textContent=fmt(S.isrAgt);

  document.getElementById('usa-d').textContent=fmt(S.usaD);
  document.getElementById('usa-inj').textContent=fmt(S.usaInj);
  document.getElementById('usa-cost').textContent=fmtM(S.usaCost);
  document.getElementById('usa-m').textContent=fmt(S.usaM);
  document.getElementById('usa-air').textContent=fmt(S.usaAir);

  const td=S.iranD+S.isrD+S.usaD;
  const ti=S.iranInj+S.isrInj+S.usaInj;
  const tc=S.iranCost+S.isrCost+S.usaCost;
  const tm=S.iranM+S.isrM+S.usaM;
  document.getElementById('tot-d').textContent=fmt(td);
  document.getElementById('tot-inj').textContent=fmt(ti);
  document.getElementById('tot-cost').textContent=fmtM(tc);
  document.getElementById('tot-m').textContent=fmt(tm);
  document.getElementById('tot-exp').textContent=fmt(S.explosions);

  document.getElementById('m-exp').textContent=fmt(S.explosions);
  document.getElementById('m-ships').textContent=fmt(S.ships);
  document.getElementById('m-oil').textContent=fmt(S.oil);
  document.getElementById('m-airstr').textContent=fmt(S.airStrikes);
  document.getElementById('m-disp').textContent=fmt(S.displaced);
}

setInterval(()=>{
  S.iranD+=rnd(3);S.iranInj+=rnd(6);
  S.isrD+=rnd(2);S.isrInj+=rnd(4);
  S.usaD+=rnd(1);S.usaInj+=rnd(2);
  S.iranCost+=520000;S.isrCost+=1350000;S.usaCost+=3100000;
  S.iranM+=rnd(2);S.isrM+=rnd(1);S.usaM+=rnd(1);
  S.explosions+=rnd(5);S.oil+=rnd(600);S.airStrikes+=rnd(2);S.displaced+=rnd(30);
  if(Math.random()<0.0008)S.ships+=1;
  render();
},1000);

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getUTCHours()).padStart(2,'0')+':'+
    String(n.getUTCMinutes()).padStart(2,'0')+':'+
    String(n.getUTCSeconds()).padStart(2,'0')+' UTC';
},1000);

render();
setLang('en');
</script>
